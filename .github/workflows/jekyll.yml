
name : Jekyll

on:
    workflow_dispatch:

    push:
        branches : [ 'Latest' ]


permissions:
    id-token : write
    contents : read
    pages : write


concurrency:
    cancel-in-progress : false
    group : 'Jekyll'

jobs:

    Build:

        runs-on : ubuntu-latest

        steps:
            -   name : Checkout
                uses : actions/checkout@v6

            -   name : Setup Ruby
                uses : ruby/setup-ruby@v1

                with:
                    bundler-cache : true
                    cache-version : 0
                    ruby-version : '3.4'

            -   name : Setup Pages
                uses : actions/configure-pages@v5
                id : Pages

            -   name : Build Jekyll
                run : bundle exec jekyll build --baseurl '${{ steps.Pages.outputs.base_path }}'

                env:
                    JEKYLL_ENV : production

            -   name : Upload artifact
                uses : actions/upload-pages-artifact@v4

                with:
                    path : ./Page

    Deploy:

        runs-on : ubuntu-latest
        needs : Build

        environment:
            name : github-pages
            url : ${{ steps.Deployment.outputs.page_url }}

        steps:

            -   name : Deploy
                uses : actions/deploy-pages@v4
                id : Deployment