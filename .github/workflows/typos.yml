
name : Typos

on:
    workflow_dispatch:

    pull_request:

    push:
        branches : [ 'main' ]


permissions:
    contents : read


jobs:

    Check:

        runs-on : ubuntu-latest

        steps:
            -   name : Checkout
                uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

            -   name : Spell Check
                uses : crate-ci/typos@7c572958218557a3272c2d6719629443b5cc26fd  # v1.45.2
